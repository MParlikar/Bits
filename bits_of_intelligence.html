<title>Bits of Intelligence</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a1a2e}
.app{min-height:100vh;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:6px;padding:10px 14px;background:#1a1a2e;border-bottom:1px solid #2d2d50;flex-wrap:wrap;position:sticky;top:0;z-index:10}
.topbar-title{font-size:13px;font-weight:700;color:#fff;margin-right:6px;white-space:nowrap;letter-spacing:1px}
.cat-btn{border:1px solid #3d3d60;border-radius:20px;padding:5px 13px;font-size:12px;cursor:pointer;background:transparent;color:#aaa;white-space:nowrap}
.cat-btn.active{background:#fff;color:#1a1a2e;border-color:#fff;font-weight:700}
.fs-btn{border:1px solid #3d3d60;border-radius:6px;padding:5px 12px;font-size:11px;cursor:pointer;background:transparent;color:#aaa;margin-left:auto}
.stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px 16px;gap:14px;background:#f5f4f0}
.cat-label{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#888;font-weight:600}
.card-wrap{width:100%;max-width:580px;-webkit-perspective:1400px;perspective:1400px}
.card{width:100%;height:540px;position:relative;-webkit-transform-style:preserve-3d;transform-style:preserve-3d;-webkit-transition:-webkit-transform 0.6s ease;transition:transform 0.6s ease;cursor:pointer}
.card.flipped{-webkit-transform:rotateY(180deg);transform:rotateY(180deg)}
.face{position:absolute;top:0;right:0;bottom:0;left:0;height:540px;-webkit-backface-visibility:hidden;backface-visibility:hidden;border-radius:18px;border:1px solid #e0ddd5;overflow:hidden;background:#fff;display:flex;flex-direction:column}
.face-back{-webkit-transform:rotateY(180deg);transform:rotateY(180deg)}
.img-wrap{width:100%;height:420px;flex-shrink:0;background:#111;position:relative;overflow:hidden}
.img-wrap img{position:absolute;top:0;right:0;bottom:0;left:0;width:100%;height:100%;object-fit:cover;object-position:center top;display:block;opacity:0;transition:opacity 0.4s}
.img-wrap img.loaded{opacity:1}
.img-wrap.contain img{object-fit:contain;object-position:center center}
.loading-box{position:absolute;top:0;right:0;bottom:0;left:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:#1a1a2e}
.spinner{width:36px;height:36px;border:3px solid #333;border-top-color:#aaa;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-box span{color:#777;font-size:13px}
.err-box{position:absolute;top:0;right:0;bottom:0;left:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:#f5f4f0;padding:24px;text-align:center}
.err-box p{color:#888;font-size:13px;line-height:1.6}
.retry-btn{border:1px solid #bbb;border-radius:8px;padding:8px 20px;font-size:13px;cursor:pointer;background:#fff;color:#555}
.card-footer{padding:12px 20px;border-top:1px solid #f0ede8;background:#fff;flex:1;display:flex;flex-direction:column;justify-content:center}
.card-title{font-size:18px;font-weight:700;color:#1a1a1a;margin-bottom:2px}
.card-sub{font-size:12px;color:#999;font-style:italic}
.tap-hint{font-size:10px;color:#bbb;text-align:right;margin-top:4px}
.back-scroll{padding:20px;overflow-y:auto;flex:1}
.back-scroll h2{font-size:16px;font-weight:700;color:#1a1a1a;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #f0ede8}
.iconic-wrap{width:100%;height:150px;background:#111;border-radius:8px;overflow:hidden;margin:10px 0 4px;display:flex;align-items:center;justify-content:center;position:relative}
.iconic-wrap img{width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 0.4s}
.iconic-wrap img.loaded{opacity:1}
.iconic-caption{font-size:11px;color:#888;font-style:italic;margin-bottom:10px}
.fact-row{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid #f5f5f5;font-size:13px;line-height:1.55;color:#333}
.fact-row:last-child{border-bottom:none}
.fact-n{color:#7F77DD;font-weight:700;min-width:20px;font-size:12px;flex-shrink:0;margin-top:1px}
.controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center}
.ctrl-btn{border:1px solid #ccc;border-radius:10px;padding:10px 24px;font-size:14px;cursor:pointer;background:#fff;color:#333;font-weight:500}
.flip-btn{border:none;border-radius:10px;padding:10px 30px;font-size:14px;cursor:pointer;background:#1a1a2e;color:#fff;font-weight:700}
.speak-btn{border:1px solid #ccc;border-radius:10px;padding:10px 18px;font-size:15px;cursor:pointer;background:#fff}
.prog{font-size:12px;color:#aaa;letter-spacing:1px}
.cns-wrap{width:100%;height:420px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#faf8f3;padding:20px}
</style>

<script>
var catIdx=0,cardIdx=0,flipped=false,order=[];

function wmUrl(fn,w){
  if(fn.slice(-4).toLowerCase()==='.svg')
    return 'https://commons.wikimedia.org/w/index.php?title=Special:FilePath/'+encodeURIComponent(fn)+'&width='+(w||600)+'&_t='+Date.now();
  return 'https://commons.wikimedia.org/w/index.php?title=Special:Redirect/file/'+encodeURIComponent(fn)+'&width='+(w||600)+'&_t='+Date.now();
}

function loadImg(wrap,fn,contain,w){
  if(contain) wrap.classList.add('contain');
  wrap.innerHTML='<div class="loading-box"><div class="spinner"></div><span>Loading...</span></div>';
  var img=document.createElement('img');
  var tried=false;
  img.onload=function(){wrap.innerHTML='';img.classList.add('loaded');wrap.appendChild(img);};
  img.onerror=function(){
    if(!tried){tried=true;img.src=wmUrl(fn,w||600);return;}
    var ef=encodeURIComponent(fn);
    wrap.innerHTML='<div class="err-box"><p>Image could not load.<br>Check your connection.</p>'
      +'<button class="retry-btn" onclick="doRetry(this,\''+ef+'\','+(contain?1:0)+','+(w||600)+')">Tap to retry</button></div>';
  };
  img.src=wmUrl(fn,w||600);
}

function doRetry(btn,ef,contain,w){loadImg(btn.parentElement.parentElement,decodeURIComponent(ef),!!contain,w);}

  frontal:'Lobes_of_the_brain_NL.svg',

  cortex:'Cerebral_cortex,_side_view.svg',
  // Human_brainstem-thalamus_posterior_view.JPG — confirmed file page (posterior view of thalamus)
  thalamus:'Human_brainstem-thalamus_posterior_view.JPG'

// Every img: filename verified as a real Wikimedia Commons file before inclusion
var CATS=[
{title:'Birds of India',cards:[
  {title:'Indian Roller',sub:'Coracias benghalensis',img:'Indian roller (Coracias benghalensis benghalensis).jpg',
   facts:['The state bird of Karnataka, Andhra Pradesh, and Odisha','Famous for its stunning turquoise and blue plumage in flight','Perches on exposed branches to hunt insects and lizards','Named for its spectacular rolling aerial display during courtship','Often seen on roadside wires and open farmland across India','Sacred to the god Vishnu in Hindu mythology and tradition','Eats grasshoppers, beetles, lizards, and small frogs','Nests in holes in trees or walls rather than building its own nest','Also called Neelkanth — meaning blue throat in Hindi','Monogamous and fiercely territorial during the breeding season']},
  {title:'White-throated Kingfisher',sub:'Halcyon smyrnensis',img:'White throated Kingfisher at Nallagandla Lake, crop.jpg',
   facts:['One of the most common and widespread kingfishers in India','Has a brilliant turquoise back and chestnut head and body','The vivid white throat and breast are distinctive field marks','Eats fish, frogs, lizards, large insects, and even small mice','Often found far from water in gardens and open woodland','Makes a loud and laughing call heard across the Indian countryside','Nests by digging a long tunnel into an earthen bank','Fiercely defends its territory against other birds','Also known as the White-breasted Kingfisher across its range','Widely distributed from Turkey all the way to the Philippines']},
  {title:'Common Kingfisher',sub:'Alcedo atthis',img:'Common Kingfisher Alcedo atthis.jpg',
   facts:['Electric blue and orange plumage makes it unmistakable','Dives into water at high speed to catch small fish','Can see underwater clearly by adjusting for light refraction','Found along rivers, lakes, and streams across all of India','Beats fish against a perch to kill it before swallowing','Monogamous — pairs often return to the same territory each year','Nests in a tunnel excavated in a riverbank up to 60 cm deep','One of the most photographed birds in the world','Both parents share incubation duties equally','Can catch a fish in a dive lasting less than a second']},
  {title:'Indian Pitta',sub:'Pitta brachyura',img:'11. Indian pitta (Pitta brachyura) photograph by Shantanu Kuveskar.jpg',
   facts:['One of the most colourful birds found in India','Has nine distinct colours on its plumage including blue, green, and red','Spends most of its time hopping on the forest floor','Migrates seasonally between its breeding and wintering grounds','Has an iconic two-note whistle call heard at dawn and dusk','Feeds on earthworms, snails, and insects on the forest floor','Breeds in the foothills of the Himalayas during the monsoon','Also called the Nine-coloured Bird for its vivid plumage','Shy and secretive — heard far more often than it is seen','State bird of the Indian state of Chhattisgarh']},
  {title:'Black Drongo',sub:'Dicrurus macrocercus',img:'18. Close-up of Black drongo (Dicrurus macrocercus) photograph by Shantanu Kuveskar.jpg',
   facts:['Glossy jet-black with a distinctive deeply forked tail','One of the most aggressive birds in India despite its small size','Fearlessly attacks eagles, crows, and even cattle to defend its nest','Often perches on the backs of cattle to catch disturbed insects','A master aerial acrobat — catches insects in mid-flight','Calls loudly with a wide range of metallic and melodic notes','Can mimic the calls of many other bird species accurately','Farmers consider it beneficial as it eats many crop pests','Migrates locally within India based on season and food availability','Also called the King Crow due to its bold and dominant behaviour']},
  {title:'Oriental Magpie-Robin',sub:'Copsychus saularis',img:'Adult Male Oriental Magpie-Robin2.jpg',
   facts:['National bird of Bangladesh and deeply loved across South Asia','Male is striking black and white — female is grey and white','One of the finest songsters in India with a rich melodious call','Sings most actively at dawn making it a favourite garden bird','Highly territorial — males sing loudly to defend their patch','Feeds on insects, earthworms, and small lizards on the ground','Nests in holes in trees, walls, and even drain pipes','A common garden bird seen across India from cities to forests','Raises its tail up and fans it when alarmed or excited','Has adapted perfectly to urban gardens and city parks']},
  {title:'Sarus Crane',sub:'Antigone antigone',img:'Sarus crane at Bharatpur.jpg',

  {title:'Painted Stork',sub:'Mycteria leucocephala',img:'Mycteria leucocephala - Pak Thale.jpg',
   facts:['Named for the vivid pink and black markings on its wings','One of the most beautiful wading birds in the Indian subcontinent','Feeds by sweeping its half-open bill through shallow water by touch','Colonial nester — thousands may nest together in a single tree colony','Found in freshwater wetlands, river floodplains, and flooded fields','Breeds after the monsoon when water levels are ideal for fishing','Chicks are fed by regurgitation directly into their open mouths','Listed as Near Threatened due to wetland drainage and hunting','The bare yellow face becomes brighter orange during breeding season','Large roost colonies are an unforgettable wildlife spectacle']},
  {title:'Greater Flamingo',sub:'Phoenicopterus roseus',img:'Greater Flamingos at Rann of Kutch.jpg',

  {title:'Common Flameback',sub:'Dinopium javanense',img:'Common Flameback on a tree.jpg',

]},
{title:'Parts of the Central Nervous System',cards:[
  {title:'The Brain',sub:'Control centre of the body',diagram:'brain',
   facts:['Weighs about 3 pounds in a human adult','Contains around 86 billion neurons','Divided into left and right hemispheres','Controls thought, memory, emotion, and movement','Uses 20 percent of the entire bodys energy supply','Floats in protective cerebrospinal fluid','Protected by the skull and three meninges membranes','Never fully switches off — even during sleep','Grows fastest in the first three years of life','Communicates via electrical and chemical signals']},
  {title:'The Cerebrum',sub:'Largest part of the brain',diagram:'cerebrum',
   facts:['Largest region of the entire human brain','Divided into left and right cerebral hemispheres','Controls all voluntary movement in the body','Processes all sensory information we receive','Responsible for language and speech production','Where personality, memory, and thought reside','Covered by the deeply folded cerebral cortex','Has four lobes: frontal, parietal, temporal, occipital','Left hemisphere controls the right side of the body','Right hemisphere controls the left side of the body']},
  {title:'The Cerebellum',sub:'The little brain',diagram:'cerebellum',
   facts:['Latin name means little brain','Located at the back and bottom of the brain','Coordinates balance and smooth precise movement','Fine-tunes all muscle activity in the body','Contains more neurons than the rest of the brain','Essential for learning new motor skills','Damage causes severe loss of coordination','Does not control conscious thought or awareness','Works closely with the motor cortex at all times','Receives constant input from the eyes and inner ears']},
  {title:'The Brain Stem',sub:'Life-support hub',diagram:'brainstem',
   facts:['Connects the brain to the spinal cord','Controls heart rate and breathing automatically','Regulates sleep and wake cycles throughout life','Relays all signals between the brain and body','Three parts: midbrain, pons, and medulla oblongata','Controls swallowing, coughing, and eye movement','All automatic body functions run from here','Damage can be immediately life-threatening','Origin of 12 pairs of cranial nerves','The oldest part of the human brain in evolutionary terms']},
  {title:'The Spinal Cord',sub:'Information superhighway',diagram:'spinalcord',
   facts:['Runs from the brain stem to the lower back','About 18 inches long in a human adult','Protected by 33 vertebrae of the backbone','Carries signals both to and from the brain','Contains millions of bundled nerve fibres','Performs reflex actions entirely without the brain','Divided into cervical, thoracic, lumbar, and sacral','Surrounded by protective cerebrospinal fluid','Injury can cause permanent loss of movement','Grey matter inside forms a distinctive butterfly shape']},
  {title:'Neurons',sub:'The brains messengers',diagram:'neuron',
   facts:['Specialised cells that transmit electrical signals','About 86 billion exist in the human brain','Signals travel at speeds up to 268 miles per hour','Each neuron connects to up to 10,000 others','Three main parts: cell body, dendrites, and axon','Myelin sheath coating dramatically speeds up signals','Signals jump between neurons via neurotransmitters','Cannot replicate themselves once fully mature','New connections form throughout your entire life','Without oxygen they begin to die within minutes']},
  {title:'The Frontal Lobe',sub:'Seat of personality',diagram:'frontal',
   facts:['The largest of the four cerebral lobes','Sits at the very front of the cerebrum','Controls planning, reasoning, and decision-making','Home of personality and all social behaviour','Manages all voluntary motor movement','Contains Brocas area for language production','Fully matures only in the human mid-twenties','Centre of emotional self-regulation and control','Working memory lives in the prefrontal cortex','Damage can dramatically alter personality and judgment']},
  {title:'The Hippocampus',sub:'Memory maker',diagram:'hippocampus',
   facts:['Named after the Greek word for seahorse','Located deep inside the temporal lobe','Converts short-term memory into long-term memory','Critical for spatial navigation and mapping','One in each hemisphere — two hippocampi in total','Severely damaged early on by Alzheimers disease','One of few brain areas that grow new neurons','Activated during sleep to consolidate memories','Essential for learning any new information','Chronic stress causes it to physically shrink']},
  {title:'The Cerebral Cortex',sub:'Outer thinking layer',diagram:'cortex',
   facts:['Thin outer layer covering the entire cerebrum','Only 2 to 4 millimetres thick','Deeply folded to pack more surface into the skull','If unfolded would cover 2.5 square feet of space','Contains 70 percent of all the brains neurons','Divided into four distinct functional lobes','Where consciousness and awareness are generated','Processes every single sense the body receives','Responsible for language, thought, and perception','Most highly developed cortex of any animal on Earth']},
  {title:'The Thalamus',sub:'Sensory relay station',diagram:'thalamus',
   facts:['Located deep in the very centre of the brain','Relays almost all sensory signals to the cortex','Called the gateway to the cerebral cortex','Processes all senses except the sense of smell','Regulates consciousness, alertness, and attention','Two oval-shaped masses joined at the middle','Controls the transition between sleep and waking','Constantly works in close partnership with the cortex','Damage can cause profound sensory loss or coma','A key part of the limbic emotional system']}
]},
{title:'Human Cell Parts',cards:[
  {title:'The Cell Nucleus',sub:'Command centre of the cell',img:'Blausen 0212 CellNucleus.png',containImg:true,
   facts:['The largest organelle in a human cell and the command centre for all cell activity','Contains the cell\'s DNA packaged into 23 pairs of chromosomes','Surrounded by a double membrane called the nuclear envelope dotted with nuclear pores','The nucleolus inside the nucleus manufactures ribosomes','Communicates instructions to the rest of the cell via messenger RNA','Without a nucleus a cell cannot divide or make most of its proteins','Red blood cells are one of the few cell types that lose their nucleus at maturity','The human nucleus contains around 3 billion base pairs of DNA','DNA in a single cell if uncoiled would stretch about 2 metres in length','Controls which genes are switched on or off in response to signals']},
  {title:'Mitochondria',sub:'The powerhouse of the cell',img:'Blausen 0644 Mitochondria.png',containImg:true,
   facts:['Often called the powerhouse of the cell because they generate most of the cell\'s ATP energy','Have their own DNA separate from the nucleus — inherited only from the mother','Thought to have evolved from ancient bacteria absorbed by early cells around 2 billion years ago','Each mitochondrion has a folded inner membrane called cristae that massively increases surface area','A single cell can contain hundreds or thousands of mitochondria depending on energy needs','Muscle cells and liver cells are packed with mitochondria because of their high energy demands','Produce ATP through a process called oxidative phosphorylation using oxygen and glucose','Also play a key role in regulating cell death through a process called apoptosis','The word mitochondria comes from Greek words meaning thread and granule','Can change shape fusing and dividing constantly in response to the cell\'s needs']},
  {title:'Endoplasmic Reticulum',sub:'The cell\'s transport network',img:'Blausen 0350 EndoplasmicReticulum.png',containImg:true,
   facts:['A vast network of interconnected membranes running through the cell cytoplasm','Comes in two types — rough ER studded with ribosomes and smooth ER without ribosomes','The rough ER folds and processes newly made proteins destined for secretion or the cell membrane','The smooth ER synthesises lipids and steroid hormones and detoxifies drugs and poisons','Physically connected to the outer membrane of the nuclear envelope','Vesicles bud off the ER to carry proteins to the Golgi apparatus for further processing','Liver cells have abundant smooth ER because of their role in breaking down toxins','Muscle cells have a specialised ER called sarcoplasmic reticulum that stores calcium ions','The lumen of the rough ER is where proteins are initially folded into their correct shapes','Named endoplasmic for its location inside the cytoplasm and reticulum for its net-like structure']},
  {title:'Golgi Apparatus',sub:'The cell\'s postal sorting office',img:'Golgi apparatus (numbers version).svg',containImg:true,
   facts:['Named after Italian scientist Camillo Golgi who discovered it in 1898','Looks like a stack of flattened pancakes called cisternae under the electron microscope','Receives proteins from the rough ER and modifies sorts and packages them for delivery','Acts like a post office — labelling and dispatching proteins to their correct destinations','Adds sugar chains to proteins in a process called glycosylation','Produces lysosomes by budding off vesicles packed with digestive enzymes','Has a cis face that receives incoming vesicles and a trans face that dispatches them','Particularly prominent in cells that secrete large amounts of material such as immune cells','Named the Golgi–Holmgren apparatus in early literature before its modern name was adopted','The discovery was initially doubted until electron microscopy confirmed its existence in the 1950s']},
  {title:'Lysosomes',sub:'The cell\'s recycling centre',img:'Nucleus ER golgi.svg',containImg:true,
   facts:['Small spherical organelles filled with around 50 different digestive enzymes','Called the suicidal bags of the cell because they can destroy the cell from within','Break down worn-out organelles foreign bacteria viruses and cellular debris','The interior is kept highly acidic at around pH 4.5 to activate the digestive enzymes','Merge with vesicles from the plasma membrane carrying material swallowed by the cell','Play a central role in autophagy — the cell\'s process of recycling its own components','Lysosomal storage diseases occur when enzymes inside lysosomes fail to function','Found mainly in animal cells — plant cells use vacuoles for a similar purpose','Produced by the Golgi apparatus which buds off vesicles loaded with hydrolytic enzymes','First described by Belgian biochemist Christian de Duve who won the Nobel Prize in 1974']},
  {title:'Ribosomes',sub:'Protein factories of the cell',img:'Animal cell structure en.svg',containImg:true,
   facts:['Responsible for synthesising every protein in the body — they are universal to all life','Made of two subunits each composed of ribosomal RNA and proteins','Can be found floating freely in the cytoplasm or attached to the rough endoplasmic reticulum','Free ribosomes make proteins used inside the cell while ER-bound ones make secreted proteins','A human cell contains millions of ribosomes at any one time','Read the genetic code carried by messenger RNA and assemble amino acids into proteins','Each amino acid is added at a rate of about 15 per second during translation','Are not enclosed by a membrane — they are the cell\'s most common non-membrane organelle','Prokaryotic ribosomes are slightly smaller than eukaryotic ones — a difference exploited by antibiotics','The 2009 Nobel Prize in Chemistry was awarded for determining the atomic structure of the ribosome']},
  {title:'Cell Membrane',sub:'The cell\'s selective border',img:'Animal mitochondrion diagram en.svg',containImg:true,
   facts:['Also called the plasma membrane — it surrounds every living cell and defines its boundary','Made of a phospholipid bilayer with proteins embedded throughout','Selectively permeable meaning it controls exactly what enters and leaves the cell','Cholesterol molecules between the phospholipids make the membrane flexible yet stable','Proteins in the membrane act as gates channels receptors and identity markers','Described by the fluid mosaic model proposed by Singer and Nicolson in 1972','The outer surface is coated with carbohydrate chains called the glycocalyx','Regulates the electrical charge across itself creating the membrane potential','Can fold inward to engulf external material in a process called endocytosis','Thickness is approximately 7 to 10 nanometres — far thinner than a soap bubble']},
  {title:'Cytoplasm',sub:'The cell\'s inner environment',img:'Animal cell structure en.svg',containImg:true,
   facts:['The jelly-like material filling the cell between the nucleus and the cell membrane','Composed mostly of water — around 70 percent of the cytoplasm is water','Contains all the organelles suspended in a gel-like fluid called cytosol','The cytosol is rich in proteins ions enzymes RNA molecules and metabolites','Acts as the medium in which most of the cell\'s chemical reactions take place','Maintains cell shape and provides a medium for organelles to move through','Cytoplasmic streaming constantly circulates the cytoplasm distributing materials within the cell','Many steps of glycolysis — the breakdown of glucose — occur in the cytoplasm','Changes from liquid to gel-like states and back depending on conditions','The cytoskeleton — a network of protein filaments — runs through the cytoplasm providing structure']},
  {title:'The Nucleolus',sub:'Ribosome assembly factory',img:'Blausen 0212 CellNucleus.png',containImg:true,
   facts:['A dense body inside the nucleus where ribosomal RNA is transcribed and ribosomes are assembled','Not surrounded by a membrane — it is a condensed region within the nucleus','Can be seen as a dark spot under the light microscope in a stained cell','A cell may have one or several nucleoli depending on its level of protein production','Disappears during cell division and reforms when division is complete','The size of the nucleolus reflects the level of protein synthesis in that cell','Rapidly dividing cancer cells often have large prominent nucleoli','Made up of ribosomal DNA ribosomal RNA and associated proteins','Produces the two ribosomal subunits which are then exported through nuclear pores to the cytoplasm','Critical for cell survival — cells that lose nucleolar function cannot make new ribosomes']},
  {title:'The Cytoskeleton',sub:'Structural framework of the cell',img:'Animal cell structure en.svg',containImg:true,
   facts:['A dynamic network of protein filaments running through the entire cytoplasm of the cell','Made of three types of fibres — microfilaments intermediate filaments and microtubules','Microfilaments made of actin give the cell its shape and enable movement','Microtubules made of tubulin act as rails for transporting organelles and vesicles around the cell','Intermediate filaments provide mechanical strength and anchor the nucleus in place','The cytoskeleton is constantly being built and dismantled — it is never static','Forms the mitotic spindle that pulls chromosomes apart during cell division','White blood cells use the cytoskeleton to crawl toward sites of infection','Drugs like taxol stabilise microtubules and are used in cancer chemotherapy','Cilia and flagella — cell projections used for movement — are built from microtubule arrays']}

function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}

function render(){
  var card=CATS[catIdx].cards[order[cardIdx]];
  flipped=false;
  document.getElementById('card').classList.remove('flipped');
  var front=document.getElementById('front');
  var back=document.getElementById('back');
  front.innerHTML='';back.innerHTML='';

  if(card.diagram){
    var cw=document.createElement('div');cw.className='cns-wrap';front.appendChild(cw);
    var ci=document.createElement('img');ci.alt=card.title;
    ci.style.cssText='max-width:100%;max-height:380px;object-fit:contain;display:block;opacity:0;transition:opacity 0.4s';
    var cnsFn=CNS[card.diagram]||CNS.brain;
    cw.innerHTML='<div class="loading-box" style="background:#faf8f3"><div class="spinner" style="border-color:#ddd;border-top-color:#777"></div><span style="color:#888;font-size:13px">Loading...</span></div>';
    ci.onload=function(){cw.innerHTML='';ci.style.opacity='1';cw.appendChild(ci);};
    ci.onerror=function(){cw.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:240px;color:#aaa;font-size:14px">'+card.title+'</div>';};
    ci.src=wmUrl(cnsFn,600);
  } else {
    var iw=document.createElement('div');iw.className='img-wrap';front.appendChild(iw);
    loadImg(iw,card.img,!!card.containImg);
  }

  var ft=document.createElement('div');ft.className='card-footer';
  ft.innerHTML='<div class="card-title">'+card.title+'</div>'
    +'<div class="card-sub">'+(card.sub||'')+'</div>'
    +'<div class="tap-hint">Tap to see 10 facts</div>';
  front.appendChild(ft);

  var sc=document.createElement('div');sc.className='back-scroll';
  var bh='<h2>'+card.title+'</h2>';
  if(card.iconic){bh+='<div class="iconic-wrap" id="iw"></div><div class="iconic-caption">'+(card.iconicCaption||'')+'</div>';}
  card.facts.forEach(function(f,i){bh+='<div class="fact-row"><span class="fact-n">'+(i+1)+'</span><span>'+f+'</span></div>';});
  sc.innerHTML=bh;back.appendChild(sc);

  if(card.iconic){var iconWrap=document.getElementById('iw');if(iconWrap)loadImg(iconWrap,card.iconic,false,card.iconicW||400);}
  document.getElementById('prog').textContent='Card '+(cardIdx+1)+' of '+order.length;
}

function flipCard(){flipped=!flipped;document.getElementById('card').classList.toggle('flipped',flipped);}
function next(){cardIdx=(cardIdx+1)%order.length;render();}
function prev(){cardIdx=(cardIdx-1+order.length)%order.length;render();}

function switchCat(i){
  catIdx=i;cardIdx=0;flipped=false;
  order=shuffle(CATS[i].cards.map(function(_,j){return j;}));
  document.querySelectorAll('.cat-btn').forEach(function(b,idx){b.classList.toggle('active',idx===i);});
  document.getElementById('cat-label').textContent=CATS[i].title;
  render();
}

function speak(){
  var card=CATS[catIdx].cards[order[cardIdx]];
  if('speechSynthesis' in window){window.speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(card.title);u.rate=0.88;u.pitch=1.05;window.speechSynthesis.speak(u);}
}

function goFS(){
  var el=document.getElementById('app');
  if(el.requestFullscreen)el.requestFullscreen();
  else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();
  else if(el.mozRequestFullScreen)el.mozRequestFullScreen();
}

document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight')next();
  else if(e.key==='ArrowLeft')prev();
  else if(e.key===' '){e.preventDefault();flipCard();}
  else if(e.key==='s'||e.key==='S')speak();
});

switchCat(0);
</script>
