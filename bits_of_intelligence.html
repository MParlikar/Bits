<!DOCTYPE html>
<html lang="en">
<head>

<title>Bits of Intelligence</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a1a2e}
.app{min-height:100vh;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:6px;padding:10px 14px;background:#1a1a2e;border-bottom:1px solid #2d2d50;flex-wrap:wrap;position:sticky;top:0;z-index:10}
.topbar-title{font-size:13px;font-weight:700;color:#fff;margin-right:6px;white-space:nowrap;letter-spacing:1px}
.cat-btn{border:1px solid #3d3d60;border-radius:20px;padding:5px 13px;font-size:12px;cursor:pointer;background:transparent;color:#aaa;white-space:nowrap}
.cat-btn.active{background:#fff;color:#1a1a2e;border-color:#fff;font-weight:700}
.fs-btn{border:1px solid #3d3d60;border-radius:6px;padding:5px 12px;font-size:11px;cursor:pointer;background:transparent;color:#aaa;margin-left:auto}
.stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px 16px;gap:14px;background:#f5f4f0}
.cat-label{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#888;font-weight:600}
.card-wrap{width:100%;max-width:580px;-webkit-perspective:1400px;perspective:1400px}
.card{width:100%;height:540px;position:relative;-webkit-transform-style:preserve-3d;transform-style:preserve-3d;-webkit-transition:-webkit-transform 0.6s ease;transition:transform 0.6s ease;cursor:pointer}
.card.flipped{-webkit-transform:rotateY(180deg);transform:rotateY(180deg)}
.face{position:absolute;top:0;right:0;bottom:0;left:0;height:540px;-webkit-backface-visibility:hidden;backface-visibility:hidden;border-radius:18px;border:1px solid #e0ddd5;overflow:hidden;background:#fff;display:flex;flex-direction:column}
.face-back{-webkit-transform:rotateY(180deg);transform:rotateY(180deg)}
.img-wrap{width:100%;height:420px;flex-shrink:0;background:#111;position:relative;overflow:hidden}
.img-wrap img{position:absolute;top:0;right:0;bottom:0;left:0;width:100%;height:100%;object-fit:cover;object-position:center top;display:block;opacity:0;transition:opacity 0.4s}
.img-wrap img.loaded{opacity:1}
.img-wrap.contain img{object-fit:contain;object-position:center center}
.loading-box{position:absolute;top:0;right:0;bottom:0;left:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:#1a1a2e}
.spinner{width:36px;height:36px;border:3px solid #333;border-top-color:#aaa;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-box span{color:#777;font-size:13px}
.err-box{position:absolute;top:0;right:0;bottom:0;left:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:#f5f4f0;padding:24px;text-align:center}
.err-box p{color:#888;font-size:13px;line-height:1.6}
.retry-btn{border:1px solid #bbb;border-radius:8px;padding:8px 20px;font-size:13px;cursor:pointer;background:#fff;color:#555}
.card-footer{padding:12px 20px;border-top:1px solid #f0ede8;background:#fff;flex:1;display:flex;flex-direction:column;justify-content:center}
.card-title{font-size:18px;font-weight:700;color:#1a1a1a;margin-bottom:2px}
.card-sub{font-size:12px;color:#999;font-style:italic}
.tap-hint{font-size:10px;color:#bbb;text-align:right;margin-top:4px}
.back-scroll{padding:20px;overflow-y:auto;flex:1}
.back-scroll h2{font-size:16px;font-weight:700;color:#1a1a1a;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #f0ede8}
.iconic-wrap{width:100%;height:150px;background:#111;border-radius:8px;overflow:hidden;margin:10px 0 4px;display:flex;align-items:center;justify-content:center;position:relative}
.iconic-wrap img{width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 0.4s}
.iconic-wrap img.loaded{opacity:1}
.iconic-caption{font-size:11px;color:#888;font-style:italic;margin-bottom:10px}
.fact-row{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid #f5f5f5;font-size:13px;line-height:1.55;color:#333}
.fact-row:last-child{border-bottom:none}
.fact-n{color:#7F77DD;font-weight:700;min-width:20px;font-size:12px;flex-shrink:0;margin-top:1px}
.controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center}
.ctrl-btn{border:1px solid #ccc;border-radius:10px;padding:10px 24px;font-size:14px;cursor:pointer;background:#fff;color:#333;font-weight:500}
.flip-btn{border:none;border-radius:10px;padding:10px 30px;font-size:14px;cursor:pointer;background:#1a1a2e;color:#fff;font-weight:700}
.speak-btn{border:1px solid #ccc;border-radius:10px;padding:10px 18px;font-size:15px;cursor:pointer;background:#fff}
.prog{font-size:12px;color:#aaa;letter-spacing:1px}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="topbar">
    <span class="topbar-title">BITS OF INTELLIGENCE</span>
    <button class="cat-btn active" onclick="switchCat(0)">Ancient</button>
    <button class="cat-btn" onclick="switchCat(1)">China</button>
    <button class="cat-btn" onclick="switchCat(2)">Money</button>
    <button class="cat-btn" onclick="switchCat(3)">Religions</button>

    <div class="cat-label" id="cat-label">Ancient Wonders of the World</div>
    <div class="card-wrap">
      <div class="card" id="card" onclick="flipCard()">
        <div class="face" id="front"></div>
        <div class="face face-back" id="back"></div>
      </div>
    </div>
    <div class="controls">
      <button class="ctrl-btn" onclick="prev()">&#8592; Prev</button>
      <button class="speak-btn" onclick="speak()">&#128266;</button>
      <button class="flip-btn" onclick="flipCard()">Flip card</button>
      <button class="ctrl-btn" onclick="next()">Next &#8594;</button>
    </div>
    <div class="prog" id="prog"></div>
  </div>
</div>
<script>
var catIdx=0,cardIdx=0,flipped=false,order=[];

function wmUrl(fn,w){
  return 'https://commons.wikimedia.org/w/index.php?title=Special:FilePath/'+encodeURIComponent(fn)+'&width='+(w||600)+'&_t='+Date.now();
}

function loadImg(wrap,fn,contain,w){
  if(contain) wrap.classList.add('contain');
  wrap.innerHTML='<div class="loading-box"><div class="spinner"></div><span>Loading...</span></div>';
  var img=document.createElement('img');
  var tried=false;
  img.onload=function(){wrap.innerHTML='';img.classList.add('loaded');wrap.appendChild(img);};
  img.onerror=function(){
    if(!tried){tried=true;img.src=wmUrl(fn,w||600);return;}
    var ef=encodeURIComponent(fn);
    wrap.innerHTML='<div class="err-box"><p>Image could not load.<br>Check your connection.</p>'
      +'<button class="retry-btn" onclick="doRetry(this,\''+ef+'\','+(contain?1:0)+','+(w||600)+')">Tap to retry</button></div>';
  };
  img.src=wmUrl(fn,w||600);
}

function doRetry(btn,ef,contain,w){loadImg(btn.parentElement.parentElement,decodeURIComponent(ef),!!contain,w);}

// Every img: filename verified as a real Wikimedia Commons file before inclusion
var CATS=[
{title:'Ancient Wonders of the World',cards:[
  {title:'The Great Pyramid',sub:'Giza, Egypt — c. 2560 BC',img:'Giza Pyramids 11.JPG',
   facts:['The oldest of the Seven Wonders of the Ancient World','The only one of the seven that is still standing today','Built around 2560 BC as the tomb of the Egyptian pharaoh Khufu','Stood 146.6 metres tall when first finished','Was the tallest man-made structure on Earth for over 3800 years','Built from an estimated 2.3 million blocks of limestone and granite','Some blocks weigh as much as 80 tonnes','Construction is believed to have taken about 20 years','The interior contains three main chambers and several passageways','Designated a UNESCO World Heritage Site in 1979']},
  {title:'Hanging Gardens of Babylon',sub:'Babylon, Iraq — c. 600 BC',img:'Hanging Gardens of Babylon by Ferdinand Knab (1886).png',containImg:true,
   facts:['A lush garden of trees flowers and vines built on terraces','Said to have been built around 600 BC by King Nebuchadnezzar II','Built for his wife who missed the green hills of her homeland','The terraces were watered by an early form of irrigation','Some sources describe the gardens rising 22 metres above the ground','The only one of the Seven Wonders whose existence is debated by historians','No physical remains have ever been found at the Babylon site','One theory says the gardens were actually built at Nineveh instead','Described in detail by ancient writers like Strabo and Philo of Byzantium','This 1611 painting by Bernard Rantwyck shows the great walls of Babylon']},
  {title:'Statue of Zeus at Olympia',sub:'Olympia, Greece — c. 435 BC',img:'The Jupiter of Phidias.jpg',containImg:true,
   facts:['A colossal statue of the king of the Greek gods','Stood about 12 metres tall in his great temple at Olympia','Sculpted around 435 BC by the famous Greek artist Phidias','Built from a wooden frame covered in ivory and gold','Phidias also made the famous statue of Athena in the Parthenon','Zeus was shown seated on an elaborate throne of cedarwood','In his right hand he held a small statue of the goddess Nike','The same site hosted the original Olympic Games every four years','The statue stood for around 800 years before being lost','Most likely destroyed when the temple burned down in the 5th century AD']},
  {title:'Temple of Artemis at Ephesus',sub:'Ephesus, Turkey — c. 550 BC',img:'Temple of Artemis.jpg',containImg:true,
   facts:['A vast temple dedicated to the Greek goddess Artemis','Located near modern Selçuk in western Turkey','Considered the most beautiful of the Seven Wonders by ancient writers','Rebuilt three times — the most famous version was completed around 550 BC','Featured 127 marble columns each 18 metres tall','First destroyed by arson in 356 BC the same night Alexander the Great was born','Burned down by a man named Herostratus seeking eternal fame','Rebuilt grander than before but finally destroyed by the Goths in 268 AD','Only the foundations and a single reconstructed column remain today','Some of its surviving sculptures are now in the British Museum']},
  {title:'Mausoleum at Halicarnassus',sub:'Bodrum, Turkey — 350 BC',img:'Mausoleum of Halicarnassus by Ferdinand Knab (1886).png',containImg:true,
   facts:['A monumental tomb built for King Mausolus of Caria','Completed around 350 BC at Halicarnassus in modern Turkey','Stood roughly 45 metres tall topped by a giant marble chariot','Decorated by four of the most famous Greek sculptors of the day','The word mausoleum still comes from his name','Survived nearly 1700 years until destroyed by earthquakes in the Middle Ages','In 1494 the Knights of St John used its stones to build Bodrum Castle','Designed by the architects Pythius and Satyros of Priene','Built by Mausolus widow Artemisia who is said to have died of grief','Surviving sculptures and frieze pieces are in the British Museum today']},
  {title:'Colossus of Rhodes',sub:'Rhodes, Greece — 280 BC',img:'Colossus of Rhodes2.jpg',containImg:true,
   facts:['A giant bronze statue of the Greek sun god Helios','Built on the Greek island of Rhodes around 280 BC','Stood about 33 metres tall — roughly the height of the Statue of Liberty','Took 12 years to complete and was one of the tallest statues of the ancient world','Celebrated victory of Rhodes over an invading army','The statue had the shortest life of any of the Seven Wonders','Toppled by an earthquake in 226 BC after only about 54 years standing','The fallen pieces lay on the ground for centuries and were still impressive','The legendary image of it straddling the harbour is almost certainly a myth','Inspired the design of the modern Statue of Liberty in New York']},
  {title:'Lighthouse of Alexandria',sub:'Alexandria, Egypt — c. 280 BC',img:'Lighthouse - Thiersch.png',containImg:true,
   facts:['Also known as the Pharos of Alexandria','Built on a small island just off the coast of Alexandria in Egypt','Completed around 280 BC during the reign of Ptolemy II','Stood over 100 metres tall and was visible from 50 kilometres away','For centuries it was the tallest building on Earth except for the Pyramids','Used a mirror to reflect sunlight by day and a fire at night to guide ships','The word pharos still means lighthouse in many languages today','Damaged by three earthquakes between 956 and 1303 AD','In 1480 its last surviving stones were used to build a fortress','Pieces of it were rediscovered underwater off Alexandria in 1994']},
  {title:'Petra',sub:'Jordan — carved from rock c. 312 BC',img:'Al Khazneh (The Treasury) in Petra.jpg',containImg:true,
   facts:['An entire ancient city carved directly into rose-red rock cliffs','Located in southern Jordan and founded around 312 BC','Was the capital of the Nabataean kingdom of trading peoples','The most famous building is the Treasury called Al-Khazneh','The Treasury facade is over 40 metres tall and carved from a single rock face','Petra was once a wealthy trading hub on caravan routes through the desert','Hidden from the outside world by tall narrow canyons','Largely lost to the West until rediscovered by explorer Burckhardt in 1812','Made a UNESCO World Heritage Site in 1985','Famously appeared in the film Indiana Jones and the Last Crusade']},
  {title:'The Parthenon',sub:'Acropolis of Athens — 432 BC',img:'Parthenon.JPG',
   facts:['A great marble temple on top of the Acropolis hill in Athens','Built between 447 and 432 BC during the Golden Age of Athens','Dedicated to Athena the patron goddess of the city','Designed by the architects Iktinos and Kallikrates','Sculptural decoration was overseen by the master sculptor Phidias','Considered the finest example of ancient Greek architecture','Survived almost intact for nearly 2000 years','Severely damaged in 1687 when a Venetian cannonball hit gunpowder stored inside','Many of its sculptures are now in the British Museum and the new Acropolis Museum','Still partly standing today and one of the most visited sites in Greece']},
  {title:'Hagia Sophia',sub:'Istanbul — 537 AD',img:'Hagia Sophia light.JPG',
   facts:['A vast domed building in Istanbul Turkey','Completed in just under six years in 537 AD','Built by the Byzantine emperor Justinian I as a Christian cathedral','Was the largest cathedral in the world for nearly a thousand years','Famous for its massive central dome that seems to float on light','The dome rises 55 metres above the floor and spans 31 metres across','Converted into a mosque after the Ottoman conquest in 1453','Served as a museum from 1935 until 2020 when it was reconverted to a mosque','The interior is decorated with magnificent Byzantine mosaics','A UNESCO World Heritage Site since 1985']}
]},
{title:'Culture of China',cards:[
  {title:'The Great Wall',sub:'One of the wonders of the world',img:'Great Wall of China at Mutianyu.JPG',
   facts:['One of the most famous landmarks on Earth','Stretches more than 21000 kilometres across northern China','Built and rebuilt over more than 2000 years by many different dynasties','The most famous and best-preserved sections were built during the Ming Dynasty between 1368 and 1644','Originally built to protect Chinese states from invaders from the north','Made from stone brick wood and packed earth depending on the region','Watchtowers were placed every few hundred metres for soldiers and signal fires','Smoke signals could carry messages along the wall faster than any horse','Became a UNESCO World Heritage Site in 1987','Visited by millions of tourists from around the world every year']},
  {title:'The Forbidden City',sub:'Imperial palace in Beijing',img:'A panoramic view of the Forbidden City.jpg',
   facts:['The largest preserved palace complex in the world','Located in the very centre of Beijing','Was the imperial palace of China for almost 500 years','Home to 24 emperors of the Ming and Qing Dynasties from 1420 to 1912','Has 980 buildings and around 9000 rooms','Surrounded by a 10 metre high wall and a wide moat','Ordinary people were forbidden to enter — that is how it got its name','Now a museum visited by over 14 million people each year','Considered one of the finest examples of traditional Chinese architecture','Became a UNESCO World Heritage Site in 1987']},
  {title:'The Terracotta Army',sub:'Buried warriors of Xi\'an',img:'Group of terracotta warriors at Xian.jpg',
   facts:['A vast collection of life-size clay soldiers buried over 2200 years ago','Created to protect the first emperor Qin Shi Huang in his afterlife','Discovered in 1974 by farmers digging a well near Xi\'an','Includes more than 8000 soldiers 670 horses and 130 chariots','Every single warrior has a different face — no two are alike','Originally painted in bright colours that have mostly faded over the centuries','It took an army of 700000 workers nearly 40 years to make','Stand in three giant pits arranged in battle formation','Considered one of the greatest archaeological finds of the 20th century','Designated a UNESCO World Heritage Site in 1987']},
  {title:'The Temple of Heaven',sub:'Beijing — built 1420',img:'Temple of Heaven, Beijing 02.JPG',
   facts:['One of the most famous religious buildings in China','Built in 1420 during the Ming Dynasty','Used by emperors to pray for good harvests every year','The main building is the Hall of Prayer for Good Harvests','It is built of wood without a single nail','The roof is covered in deep blue tiles to represent the sky','The temple is round to symbolise heaven and stands on a square base symbolising earth','Built using ancient Chinese rules of cosmology','Now part of a large public park where Beijingers gather to exercise and play music','Became a UNESCO World Heritage Site in 1998']},
  {title:'The Giant Panda',sub:'National treasure of China',img:'Giant Panda eating Bamboo.JPG',
   facts:['A black-and-white bear native to the bamboo forests of central China','Considered a national treasure and unofficial symbol of China','Adults can weigh up to 150 kilograms','Spend up to 14 hours a day eating bamboo','Eat about 12 to 38 kilograms of bamboo every single day','Have a special wrist bone that works like a thumb to grip bamboo stalks','Mothers give birth to tiny cubs that weigh only about 100 grams','Once threatened with extinction but conservation has brought numbers back up','China lends pandas to zoos around the world as a symbol of friendship','The world wildlife fund has used the panda as its logo since 1961']},
  {title:'Dragon Dance',sub:'Symbol of power and luck',img:'Chinese Dragon Dance Show.jpg',
   facts:['A traditional Chinese dance performed at festivals especially Chinese New Year','A team of dancers holds the dragon up on poles and makes it twist and twirl','Chinese dragons are different from Western ones — they bring good luck and rain','Dragons are usually long and snake-like with no wings','Dragon dances can use dragons more than 100 metres long','The longer the dragon the more good fortune it is believed to bring','Each dragon is made by hand from cloth bamboo and paper','Performed to drumbeats clashing cymbals and exploding firecrackers','The number of segments in a dragon is always odd because odd numbers are lucky','One of the most important traditional arts in Chinese culture']},
  {title:'Chinese Calligraphy',sub:'The art of writing',img:'Chinese calligraphy in Xi-an 01.JPG',
   facts:['The traditional Chinese art of writing characters with a brush','Considered one of the highest forms of fine art in China','The four treasures of calligraphy are the brush ink ink stone and paper','Children in China still learn calligraphy in school today','Chinese writing uses thousands of different characters not letters','Each character represents a word or part of a word','The oldest known Chinese writing dates back over 3000 years','A skilled calligrapher can take a lifetime to truly master the art','The way a person writes can reveal something about their personality and mood','Calligraphy is also practiced in Korea Japan and Vietnam']},
  {title:'Chinese Tea',sub:'A drink with 5000 years of history',img:'Yixing ware teapot and Lapsang tea.jpg',
   facts:['Tea was first discovered in China nearly 5000 years ago','Legend says Emperor Shennong discovered tea when leaves blew into his pot of boiling water','China is the largest producer of tea in the world','Famous Chinese teas include green tea oolong jasmine and pu-erh','The most famous green tea is Longjing or Dragon Well from Hangzhou','Special clay teapots called Yixing teapots are used to brew tea','The Chinese tea ceremony focuses on calm and respect','Tea was so valuable in ancient China that pressed tea bricks were used as money','It was Chinese tea that started the worldwide tradition of tea drinking','Tea travelled along the Silk Road to the Middle East and then to Europe']},
  {title:'Jiaozi',sub:'Chinese dumplings',img:'Chinese Steamed Dumplings.jpeg',containImg:true,
   facts:['Crescent-shaped dumplings filled with meat and vegetables','One of the most popular foods in China and across Asia','Said to have been invented over 1800 years ago by a doctor named Zhang Zhongjing','He shaped them like little ears to feed people during a freezing winter','Eaten especially during Chinese New Year for good luck','Their shape is supposed to look like ancient gold ingots — symbols of wealth','Can be steamed boiled or fried in a pan to make potstickers','Common fillings include pork chives shrimp and cabbage','Families often gather to make them by hand together','Many Chinese people make 100 or more jiaozi to share at New Year']},
  {title:'Lantern Festival',sub:'End of Chinese New Year',img:'The lanterns for celebrating Lantern Festival.jpg',
   facts:['Marks the last day of Chinese New Year celebrations','Falls on the 15th day of the first month of the Chinese lunar calendar','Has been celebrated in China for over 2000 years','Streets temples and homes are decorated with thousands of bright red lanterns','Lanterns come in many shapes — fish dragons rabbits and lotus flowers','Children carry small lanterns through the streets after dark','People eat sweet sticky rice balls called tangyuan that symbolise family unity','Some lanterns have riddles written on them for guests to solve','In some places paper lanterns are released into the sky carrying wishes','Marks the first full moon of the new year and the official end of the holiday']}
]},
{title:'How Money Works',cards:[
  {title:'Before Money: Barter',sub:'Trading goods for goods',img:'Maori bartering a crayfish - Drawings illustrative of Captain Cook\'s First Voyage (1769), f.11 - BL Add MS 15508.jpg',containImg:true,
   facts:['Long ago people did not have money so they traded things directly','This is called barter — for example trading a basket of fish for a clay pot','The big problem with barter is that both people had to want what the other had','You also had to agree how many fish equal one pot','That is why people invented money — it works for almost everything','The first known money was used over 5000 years ago in Mesopotamia','Some early peoples used shells salt or even cattle as money','When everyone agrees something is money trading becomes much easier','Some people still barter today especially online and at swap meets','Money is really just a tool to make trading simpler and fairer']},
  {title:'Where Coins Are Made',sub:'The U.S. Mint',img:'Denver Mint (40212263814).jpg',
   facts:['Coins are made in special factories called mints','The United States has mints in Denver Philadelphia San Francisco and West Point','The Denver Mint makes billions of coins every single year','Coins start out as long flat strips of metal called coils','A blanking machine punches out plain metal discs called planchets','Then a coining press stamps the design onto both sides at once','One press can make over 700 coins per minute','A small letter on the coin tells you which mint made it — D for Denver P for Philadelphia','Coins last about 30 years before they wear out and have to be melted down','The first U.S. Mint was built in Philadelphia in 1792']},
  {title:'Where Bills Are Printed',sub:'The Bureau of Engraving and Printing',img:'Bureau of Engraving and Printing.JPG',
   facts:['Paper money is printed at the Bureau of Engraving and Printing','It has two locations — Washington D.C. and Fort Worth Texas','Bills are not actually made of paper — they are made of cotton and linen','That is why money does not fall apart if you accidentally wash it','Each bill has tiny details that are very hard to copy to stop counterfeiters','Modern bills have a special strip inside that glows under ultraviolet light','One sheet of paper can be printed with 32 bills at once','Printing presses use special inks that include some that change colour when tilted','Bills wear out and worn ones are taken out of circulation and shredded','A one dollar bill stays in circulation for about six years before being replaced']},
  {title:'The Central Bank',sub:'The Federal Reserve',img:'Marriner S. Eccles Federal Reserve Board Building.jpg',
   facts:['The Federal Reserve is the bank for all the other banks in the United States','People often just call it the Fed','It was created in 1913 to help keep the economy stable','One main job is to decide how much new money to put into the economy','It also sets interest rates which affect how much it costs to borrow money','When people are out of work the Fed can lower rates to help businesses grow','When prices go up too fast the Fed can raise rates to slow things down','The Fed is led by a Chair appointed by the President of the United States','Almost every country has a central bank that does similar work','The Bank of England is the central bank of the United Kingdom']},
  {title:'Earning Money',sub:'Where money comes from',img:'Lemonade Stand (6664771423).jpg',containImg:true,
   facts:['People earn money by doing work that is useful to other people','You can earn money by selling things you make like lemonade or art','You can also earn money by helping with chores or doing odd jobs','When grown-ups work at a job they get paid wages or a salary','Most people get paid every two weeks or once a month','Some people own businesses and earn money from selling products or services','Money you earn is called income','A small part of every paycheck goes to taxes which pay for schools and roads','The amount you earn depends on the work you do and the skills you have','The first money most kids ever earn often comes from a small business like a lemonade stand']},
  {title:'Saving Money',sub:'The piggy bank',img:'Piggy Bank On Pennies (5915295831).jpg',
   facts:['Saving means putting money aside instead of spending it right away','Saving helps you afford bigger things you really want like a bike','It also helps you be ready for surprises like fixing a broken toy','The piggy bank has been a popular saving tool for over 600 years','Real piggy banks were used in Indonesia as far back as the 1300s','To get the money out of an old piggy bank you had to break it open','Today many piggy banks have a stopper on the bottom so you can save again','The most important rule of saving is to save a little bit every week','Many grown-ups try to save at least 10 pennies of every dollar they earn','Saving regularly is the most powerful money habit anyone can build']},
  {title:'Banks and ATMs',sub:'Where money is kept safe',img:'Allpoint ATM Machine (49431005611).jpg',
   facts:['A bank is a business that keeps your money safe for you','When you put money in a bank that is called a deposit','You can take money out whenever you need it — that is called a withdrawal','Banks pay you a small reward called interest for keeping your money there','Banks lend the saved money to other people to buy things like houses','That is how banks make money — they earn interest on the loans they give out','An ATM stands for Automated Teller Machine — a robot bank teller','The first ATM was used in London in 1967','Today there are over three million ATMs around the world','Now most people can use their phones to bank without ever visiting a building']},
  {title:'Credit Cards',sub:'Borrowing to spend',img:'2. Front of first mag striped encoded plastic card.JPG',containImg:true,
   facts:['A credit card lets you buy things now and pay for them later','When you use a credit card the bank pays the shop and you owe the bank','At the end of the month the bank sends a bill of everything you spent','If you do not pay the whole bill the bank charges extra money called interest','That is why credit cards can be expensive if you are not careful','The first plastic credit card was made in 1958','Before that some cards were made of cardboard or metal','A debit card is different — it takes money straight from your bank account','Credit cards have a tiny chip and a code that keeps them secure','Most adults have at least one credit card but they have to use them carefully']},
  {title:'The Stock Market',sub:'Owning a piece of a company',img:'New York Stock Exchange August 2017 02.jpg',
   facts:['When a company wants to grow it can sell tiny pieces of itself called shares','People who buy shares are called shareholders and own a small part of the company','The place where shares are bought and sold is called a stock exchange','The most famous stock exchange is the New York Stock Exchange on Wall Street','It opened way back in 1792 under a buttonwood tree on Wall Street','When a company does well its shares go up in value','When it does badly its shares go down','Buying shares is called investing','Investing can grow your money over many years if the company succeeds','But it is risky — sometimes a company fails and people lose their money']},
  {title:'Gold and Storing Wealth',sub:'Why people trust gold',img:'Photograph of a vault with gold bars - NARA - 296609.jpg',
   facts:['For thousands of years gold has been used as a special kind of money','Gold does not rust or fall apart so it lasts forever','Gold is rare — there is not much of it in the world which makes it valuable','One large gold bar weighs about 12.5 kilograms or 27 pounds','That is heavier than a small dog','The United States stores its gold bars in a famous vault at Fort Knox in Kentucky','Most countries keep some of their wealth as gold in case of emergencies','When people are worried about money many of them buy gold','Gold has been used as money for over 2500 years','Today gold is also used in jewellery electronics and even some medicines']}
]},
{title:'Religions of the World',cards:[
  {title:'Christianity',sub:'St Peter\'s Basilica — Vatican City',img:'Saint Peter\'s Basilica dome.jpg',
   facts:['The largest religion in the world with over 2 billion followers','Founded around 2000 years ago in the Middle East','Followers believe Jesus Christ is the son of God','Holy book is the Bible made up of the Old and New Testaments','The cross is the most recognised symbol of Christianity','Main branches are Catholic Orthodox and Protestant','Christmas celebrates the birth of Jesus and Easter his resurrection','St Peter\'s Basilica in the Vatican is the centre of the Catholic Church','Christianity is practiced on every continent and in almost every country','The Pope is the leader of the worldwide Catholic Church']},
  {title:'Islam',sub:'The Kaaba — Mecca',img:'Mecca Kaaba.JPG',
   facts:['The second largest religion in the world with over 1.9 billion followers','Founded in Arabia in the 7th century by the Prophet Muhammad','Muslims believe in one God called Allah in Arabic','Holy book is the Quran written in Arabic','Muslims pray five times a day facing the city of Mecca','The Kaaba in Mecca is the most sacred site in Islam','Every adult Muslim should try to visit Mecca once in their life on the Hajj','The Islamic holy day of the week is Friday','Two main branches are Sunni and Shia','The symbol of Islam is often shown as the crescent moon and star']},
  {title:'Judaism',sub:'The Western Wall — Jerusalem',img:'Western Wall, Jerusalem, Shavuot.JPG',
   facts:['One of the oldest religions in the world dating back nearly 4000 years','Followers are called Jews and believe in one God','Their holy book is the Torah','Place of worship is called a synagogue','The Star of David is a well-known Jewish symbol','The Western Wall in Jerusalem is the holiest place where Jews pray','Important holidays include Hanukkah Passover and Yom Kippur','The Jewish day of rest is Saturday called Shabbat','Followers eat kosher food prepared by religious rules','Jewish boys traditionally have a bar mitzvah at age 13']},
  {title:'Hinduism',sub:'Meenakshi Temple — India',img:'Meenakshi Temple, Madurai, Tamil Nadu, India 01.JPG',
   facts:['The third largest religion in the world with over 1.2 billion followers','One of the oldest religions still practiced today','Most followers live in India and Nepal','Hindus believe in one supreme spirit that takes many forms as gods and goddesses','Famous gods include Vishnu Shiva Brahma Ganesha and Lakshmi','The sacred symbol Om is chanted in prayer and meditation','Holy books include the Vedas the Upanishads and the Bhagavad Gita','Hindus believe in reincarnation — that the soul lives many lives','The cow is considered sacred and is not eaten by most Hindus','The river Ganges is the holiest river in Hinduism']},
  {title:'Buddhism',sub:'Mahabodhi Temple — Bodh Gaya',img:'Exterior view of the Mahabodhi Temple.jpg',
   facts:['Founded around 2500 years ago by Siddhartha Gautama known as the Buddha','Has over 500 million followers mostly in Asia','The word Buddha means the awakened or enlightened one','Buddhists do not worship a god — they follow the teachings of the Buddha','The Buddha taught that suffering comes from desire and attachment','The Four Noble Truths and the Eightfold Path are central teachings','Buddhists meditate to find peace and wisdom','The Buddha gained enlightenment under the Bodhi Tree in Bodh Gaya India','The lotus flower is an important Buddhist symbol of purity','Main branches are Theravada Mahayana and Vajrayana']},
  {title:'Sikhism',sub:'The Golden Temple — Amritsar',img:'Sri Harmandir Sahib.JPG',
   facts:['Founded in the 15th century in the Punjab region of South Asia','Has around 30 million followers worldwide','Founded by Guru Nanak the first of ten Sikh Gurus','Sikhs believe in one God who has no form or gender','The Golden Temple in Amritsar India is the most sacred Sikh site','Holy book is the Guru Granth Sahib which is treated as the eternal Guru','Sikh men traditionally do not cut their hair and wear a turban','The five articles of faith all begin with the letter K including the kara bracelet','Free meals are served to all visitors at every Sikh temple — called langar','Sikhism teaches equality of all people regardless of caste race or gender']},
  {title:'Shinto',sub:'Itsukushima Shrine — Japan',img:'Torii and Itsukushima Shrine.jpg',
   facts:['The traditional native religion of Japan','Has been practiced for over 2000 years','Followers believe in spirits called kami that live in nature','Kami can be found in mountains rivers trees rocks and the wind','Shinto has no founder no holy book and no single set of beliefs','Places of worship are called shrines or jinja','Famous gateways called torii mark the entrance to sacred Shinto spaces','The torii of Itsukushima Shrine appears to float on water at high tide','Practices include hand washing prayer and small offerings to the kami','Most Japanese people participate in Shinto traditions even today']},
  {title:'Taoism',sub:'An ancient Chinese religion',img:'Qingxia Taoist Temple of Weibao Mountain.JPG',
   facts:['An ancient Chinese religion and philosophy that began over 2500 years ago','Founded according to tradition by the sage Laozi','The word Tao means the way or the path','Followers seek to live in harmony with nature and the universe','Holy book is the Tao Te Ching written by Laozi','The famous yin and yang symbol comes from Taoism','It represents the balance of opposites — light and dark soft and hard','Taoism teaches simplicity patience and compassion','Has influenced Chinese medicine martial arts and feng shui for centuries','Tai chi and qigong are practices that grew out of Taoist traditions']},
  {title:'Baha\'i Faith',sub:'The Lotus Temple — Delhi',img:'Lotus Temple, Baha - i - House, Delhi.jpg',
   facts:['One of the youngest world religions founded in 1844 in Persia',"Founded by Baha'u'llah who Baha'is consider the most recent messenger of God","Teaches that all major world religions come from the same one God",'Believes in the unity of all humanity regardless of race or country',"Has around 8 million followers in nearly every country in the world",'Houses of worship are open to people of all religions','The Lotus Temple in Delhi is shaped like a giant lotus flower','It has 27 free-standing white marble petals arranged in clusters of three','Followers gather to read scriptures from many different faiths together','Important values include education equality and peace among all people']},
  {title:'Jainism',sub:'Ranakpur Temple — India',img:'RANAKPUR JAIN TEMPLE.JPG',
   facts:['An ancient religion that began over 2500 years ago in India','Has around 4 to 5 million followers most living in India','The most important teaching is ahimsa or non-violence','Jains try not to harm any living creature including the tiniest insect','Many Jains are strict vegetarians and some wear masks to avoid breathing in bugs','Founded by Mahavira the 24th and last great teacher called a Tirthankara','Jains believe in karma — that good and bad actions return to you','The famous Ranakpur Temple has 1444 marble pillars no two of which are alike','Jains believe in many cycles of birth and rebirth','The religion has had a strong influence on Hindu and Buddhist non-violence']}
]},
{title:'Butterflies',cards:[
  {title:'Monarch Butterfly',sub:'Danaus plexippus',img:'Male monarch butterfly.JPG',
   facts:['One of the most recognised butterflies in the world','Has bright orange wings with bold black borders and white spots','Wings span about 10 centimetres or 4 inches','Famous for its enormous yearly migration across North America','Some monarchs travel up to 4800 kilometres from Canada to Mexico','They are the only butterflies known to make a true two-way migration','Caterpillars eat only milkweed which makes the adults poisonous to predators','The bright orange colour warns birds that they taste bad','Each year a new generation finds the same wintering sites their ancestors used','Monarch numbers have dropped sharply in recent decades and they are now threatened']},
  {title:'Blue Morpho',sub:'Morpho peleides',img:'Blue Morpho (6133928076).jpg',
   facts:['One of the largest butterflies in the world with a wingspan up to 20 centimetres','Lives in the rainforests of Central and South America','The brilliant blue colour is not from pigment but from the tiny structure of the wing scales','When the wings close the underside is dull brown to hide from predators','The flashing blue and brown as it flies confuses birds trying to catch it','Adults do not eat flowers — they sip juice from rotting fruit','Their lifespan as an adult butterfly is only about two to three weeks','Males are more brightly coloured than females and defend territory','The bright blue can be seen from far away in the rainforest canopy','Often kept in butterfly houses around the world because it is so striking']},
  {title:'Tiger Swallowtail',sub:'Papilio glaucus',img:'Papilio glaucus male.JPG',
   facts:['A large yellow butterfly with bold black tiger-like stripes','Native to the eastern half of North America','Has a wingspan of 8 to 14 centimetres','Named for the tail-like extensions on its hind wings','The tails confuse birds into pecking the wing instead of the body','Females come in two forms — yellow like the males or all dark','The dark form mimics a poisonous butterfly to fool predators','Caterpillars look like little green snakes with fake eye spots to scare birds','Adopted as the official state butterfly of five US states','Likes to drink from puddles in groups — this is called puddling']},
  {title:'Old World Swallowtail',sub:'Papilio machaon',img:'Papilio machaon (Mount Kisokoma).JPG',
   facts:['A beautiful large butterfly found across Europe Asia and North America','Has yellow wings with black bands and bright blue and red spots','Wingspan reaches 8 to 9 centimetres','Named for the long pointed tails on its hind wings like a swallows tail','Caterpillars feed on plants in the carrot family like fennel and dill','When threatened the caterpillar pops out an orange forked organ that smells bad','First scientifically named in 1758 by Carl Linnaeus the father of biology','In Britain it is rare and lives only in the Norfolk Broads','Strong fliers that can travel long distances looking for food','Has been the inspiration for many works of art and stamps around the world']},
  {title:'Peacock Butterfly',sub:'Aglais io',img:'Peacock butterfly (Aglais io) 2.jpg',
   facts:['Famous for the four big eye spots on its wings that look like peacock feathers','Found across Europe and parts of Asia','Wingspan is about 5 to 6 centimetres','When threatened it suddenly opens its wings and flashes the eyespots','This startles birds and other predators long enough for it to escape','It can also rub its wings together to make a hissing sound','When the wings are closed the underside is almost black to hide on tree bark','Adults can live for nearly a year — much longer than most butterflies','They hibernate through winter in sheds barns and hollow trees','One of the first butterflies you see flying in early spring']},
  {title:'Red Admiral',sub:'Vanessa atalanta',img:'Vanessa atalanta (SWE).JPG',
   facts:['A medium-sized butterfly with black wings and bold red and white markings','Found across Europe North America North Africa and Asia','Wingspan is about 5 to 6 centimetres','A very strong flier that can keep up with running children','Likes to feed on rotting fruit and tree sap as well as flowers','Migrates south for the winter from northern Europe to the Mediterranean','Active even on cool autumn days when most butterflies hide','Often very tame and will land on people who stand still','Caterpillars feed almost only on stinging nettles','One of the few butterflies still seen flying in late October']},
  {title:'Painted Lady',sub:'Vanessa cardui',img:'Vanessa cardui Kiev obl.JPG',
   facts:['Probably the most widely distributed butterfly in the entire world','Found on every continent except Antarctica and South America','Has orange black and white patterned wings about 5 to 6 centimetres across','Makes one of the longest migrations of any insect — up to 14000 kilometres','Travels from sub-Saharan Africa to the Arctic Circle and back over six generations','No single butterfly makes the whole journey — their great-great-grandchildren return','Caterpillars feed on thistles and many other plants','Sometimes seen in huge swarms when conditions are right','Has been seen flying at altitudes over 3000 metres','Also called the thistle butterfly because of its favourite caterpillar food']},
  {title:'Glasswing',sub:'Greta oto',img:'Glasswinged butterfly (Greta oto).jpg',
   facts:['Has wings that are mostly transparent like glass','You can see right through the wings to whatever is behind','The clear patches help it hide from predators by blending into the background','Found in the rainforests of Mexico and Central America','Wingspan is about 5 to 6 centimetres','The wing scales are tiny and arranged so they barely reflect light','Scientists study its wings to design better non-reflective glass for screens','Despite looking delicate it can fly long distances looking for food','Caterpillars feed on poisonous plants which make the adults toxic too','Considered one of the most beautiful butterflies in the world']},
  {title:'Cabbage White',sub:'Pieris rapae',img:'Cabbage White (Pieris rapae) (7854289830).jpg',
   facts:['One of the most common butterflies you can spot in gardens worldwide','Has white wings with one or two small black spots','Wingspan is only about 4 to 5 centimetres','Originally from Europe but now found almost everywhere','Caterpillars are bright green and love to eat cabbage and other leafy vegetables','Considered a pest by farmers because of the damage to crops','Adults feed on flower nectar and prefer purple and yellow flowers','Females lay around 800 eggs in their short adult life','Goes through several generations every year','Often the first butterfly children learn to spot and identify']},
  {title:'Zebra Longwing',sub:'Heliconius charithonia',img:'Zebra Longwing - Heliconius charithonia.jpg',
   facts:['Has long thin black wings striped with bright yellow like a zebra','Found in tropical parts of the Americas from Florida to Peru','Wingspan is about 7 to 10 centimetres','Unlike most butterflies it eats pollen as well as nectar','Eating pollen lets it live up to six months — much longer than most butterflies','Adults sleep together in groups every night returning to the same spot','Slow flying and easy to watch','The official state butterfly of Florida since 1996','Caterpillars eat passion flower vines which makes them poisonous to predators','Bright yellow stripes warn birds that this butterfly is bad to eat']}
]},
{title:'Roses',cards:[
  {title:'Damask Rose',sub:'Rosa damascena — ancient hybrid',img:'Rosa damascena 003.JPG',
   facts:['One of the oldest cultivated roses in the world','Grown for over 2000 years for its powerful fragrance','A natural hybrid between Rosa gallica and Rosa moschata','Used to produce most of the worlds rose oil and rose water','Cultivated on a huge scale in Bulgaria Turkey and Iran','It takes about 4000 kilograms of petals to produce one kilogram of essential oil','Petals are picked by hand at dawn when the fragrance is strongest','Pink or light red flowers bloom in clusters with intense scent','Brought to Europe from the Middle East during the Crusades','The basis of the term damask used for pink and red colours']},
  {title:'Rosa rugosa',sub:'Japanese rose — Rugosa',img:'Rosa rugosa Rynkerose.JPG',
   facts:['A vigorous hardy rose native to eastern Asia','Common names include Japanese rose and beach rose','Famous for its very tough heavily wrinkled or rugose leaves','Highly resistant to disease pests salt spray and cold','Often planted along coastlines and roadsides as a windbreak','Produces some of the largest rose hips of any rose species','The hips are rich in vitamin C and used in jams and teas','Flowers are deep magenta pink or white with a strong clove-like scent','Has naturalised widely in Europe and North America','Used as a parent for many tough garden rose hybrids']},
  {title:'Dog Rose',sub:'Rosa canina — wild rose of Europe',img:'Rosa canina 6.JPG',
   facts:['The most common wild rose across Europe and the British Isles','Climbs through hedgerows and woodland edges to 3 metres or more','Five-petaled flowers in pale pink or white bloom in early summer','Produces bright red rose hips that ripen in autumn','Rose hips are an important winter food for birds','The hips are extremely rich in vitamin C and used for syrup','During World War II British children gathered the hips for the war effort','Has stout curved thorns shaped like a dogs canine teeth','One of the parent species of many modern garden roses','The national flower of Romania']},
  {title:'Yellow Rose',sub:'Rosa foetida — Persian yellow',img:'Austrian-briar-Rosa-foetida-Madrid.jpg',
   facts:['Native to the mountains of southwest Asia from Turkey to Iran','One of the first truly bright yellow roses known in the West','Brought from Persia to Europe in the 16th century','Has bright golden-yellow single flowers with a strong unusual scent','Often considered the founding parent of all modern yellow roses','Bred by Joseph Pernet-Ducher in 1900 to create the first yellow hybrid teas','Notoriously prone to black spot fungal disease','The cultivar Persian Yellow has been grown in gardens since the 1830s','Some forms have flowers that are bright red on one side and yellow on the other','A vital ancestor of nearly every yellow orange and copper-coloured rose today']},
  {title:'Peace',sub:'Rosa Madame A. Meilland — 1945',img:'Rosa ‘Gloria Dei’ syn. ‘Peace’.jpg',
   facts:['One of the most famous and successful roses of the 20th century','Bred by Francis Meilland in France in the 1930s','Cuttings were sent abroad just before Germany invaded France in 1940','Saved by the Conard-Pyle Company in the United States during the war','Released in the US on the very day Berlin fell in 1945','Named Peace to mark the end of the Second World War','Pale yellow flowers tinged with pink at the petal edges','Won countless awards and over 100 million plants have been sold','Inducted into the World Federation of Rose Societies Hall of Fame in 1976','Given to every delegation at the founding meeting of the United Nations']},
  {title:'Mister Lincoln',sub:'A classic dark red rose',img:'Rosa \'Mister Lincoln\' 1964.jpg',
   facts:['One of the most popular dark red hybrid tea roses ever bred','Created by Herbert Swim and Weeks Rose Growers in California in 1964','Won the All-America Rose Selections award in 1965','Named after the 16th American president Abraham Lincoln','Has a strong rich damask fragrance noticeable from several metres away','Velvety crimson red blooms with 30 to 35 petals each','Grows tall and upright reaching up to 2 metres in height','Was the best-selling crimson rose in the United States for many years','Blooms repeatedly throughout the growing season','A go-to choice for cut flowers because of its long stems and strong scent']},
  {title:'Iceberg',sub:'Rosa Schneewittchen — white floribunda',img:'Rose Iceberg(Schneewittchen) アイスバーグ -シュネービッチェン（白雪姫） (5568091320).jpg',
   facts:['A pure white floribunda rose bred by Reimer Kordes in Germany in 1958','Known as Schneewittchen meaning Snow White in German','Marketed as Iceberg in the English-speaking world','Among the most popular and widely planted roses in the world','Named the Worlds Favourite Rose by the World Federation of Rose Societies in 1983','Blooms almost continuously from late spring until the first frost','Produces clusters of lightly scented semi-double white flowers','Tolerates poor soil partial shade and a wide range of climates','Was the parent of many later white floribunda and climbing roses','Climbing and pink forms have been developed over the years']},
  {title:'Double Delight',sub:'Cream and crimson hybrid tea',img:'Rosa \'Double delight\' 1977.jpg',
   facts:['A striking bicoloured hybrid tea rose with creamy white and strawberry red petals','Bred by Herbert Swim and AE Ellis in California in 1976','Won the All-America Rose Selections award in 1977','The red colouring grows stronger in sunny weather and on the outer petals','Has a very strong spicy fragrance considered among the best of any rose','Selected for the Worlds Favourite Rose Hall of Fame in 1985','Each flower has 35 to 45 petals and high-centred classic form','Petals form striking patterns making no two blooms quite alike','Grows about a metre tall with bushy upright habit','One of the most photographed roses in the world']},
  {title:'Graham Thomas',sub:'David Austin English rose — 1983',img:'Englische Rosen ´Graham Thomas´.jpg',containImg:true,
   facts:['A modern English shrub rose bred by David Austin in 1983','One of the most famous David Austin roses ever introduced','Named after the British horticulturist Graham Stuart Thomas','Combines the rich form and fragrance of old roses with modern repeat blooming','Bears cup-shaped fully double flowers in deep golden yellow','Has a strong fresh tea-like fragrance','Each rose has around 75 petals giving a lush rosette appearance','Voted the Worlds Favourite Rose in 2009','Helped make David Austin English roses popular around the world','Can be grown as a tall shrub or trained as a short climber']},
  {title:'Eden Rose',sub:'Pierre de Ronsard — French climber',img:'Rosa \'Eden Rose\' J1.JPG',
   facts:['A romantic climbing rose bred by Jacques Mouchotte for Meilland France in 1985','Officially named Pierre de Ronsard after the famous French poet','Known as Eden Climber or Eden Rose 85 in many countries','Has large cup-shaped pale pink flowers with a deeper rose-pink centre','Each bloom has over 100 petals giving an old-fashioned charm','Selected as the Worlds Favourite Rose in 2006','Almost no fragrance — one of the few roses bred entirely for visual beauty','A vigorous climber growing 3 metres or more in good conditions','Highly disease resistant and easy to grow for beginners','Has become one of the most photographed roses in modern gardens']}
]}];

function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}

function render(){
  var card=CATS[catIdx].cards[order[cardIdx]];
  flipped=false;
  document.getElementById('card').classList.remove('flipped');
  var front=document.getElementById('front');
  var back=document.getElementById('back');
  front.innerHTML='';back.innerHTML='';

  var iw=document.createElement('div');iw.className='img-wrap';front.appendChild(iw);
  loadImg(iw,card.img,!!card.containImg);

  var ft=document.createElement('div');ft.className='card-footer';
  ft.innerHTML='<div class="card-title">'+card.title+'</div>'
    +'<div class="card-sub">'+(card.sub||'')+'</div>'
    +'<div class="tap-hint">Tap to see 10 facts</div>';
  front.appendChild(ft);

  var sc=document.createElement('div');sc.className='back-scroll';
  var bh='<h2>'+card.title+'</h2>';
  if(card.iconic){bh+='<div class="iconic-wrap" id="iw"></div><div class="iconic-caption">'+(card.iconicCaption||'')+'</div>';}
  card.facts.forEach(function(f,i){bh+='<div class="fact-row"><span class="fact-n">'+(i+1)+'</span><span>'+f+'</span></div>';});
  sc.innerHTML=bh;back.appendChild(sc);

  if(card.iconic){var iconWrap=document.getElementById('iw');if(iconWrap)loadImg(iconWrap,card.iconic,false,card.iconicW||400);}
  document.getElementById('prog').textContent='Card '+(cardIdx+1)+' of '+order.length;
}

function flipCard(){flipped=!flipped;document.getElementById('card').classList.toggle('flipped',flipped);}
function next(){cardIdx=(cardIdx+1)%order.length;render();}
function prev(){cardIdx=(cardIdx-1+order.length)%order.length;render();}

function switchCat(i){
  catIdx=i;cardIdx=0;flipped=false;
  order=shuffle(CATS[i].cards.map(function(_,j){return j;}));
  document.querySelectorAll('.cat-btn').forEach(function(b,idx){b.classList.toggle('active',idx===i);});
  document.getElementById('cat-label').textContent=CATS[i].title;
  render();
}

function speak(){
  var card=CATS[catIdx].cards[order[cardIdx]];
  if('speechSynthesis' in window){window.speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(card.title);u.rate=0.88;u.pitch=1.05;window.speechSynthesis.speak(u);}
}

function goFS(){
  var el=document.getElementById('app');
  if(el.requestFullscreen)el.requestFullscreen();
  else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();
  else if(el.mozRequestFullScreen)el.mozRequestFullScreen();
}

document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight')next();
  else if(e.key==='ArrowLeft')prev();
  else if(e.key===' '){e.preventDefault();flipCard();}
  else if(e.key==='s'||e.key==='S')speak();
});

switchCat(0);
</script>
