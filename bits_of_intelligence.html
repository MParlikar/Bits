function wmUrl(fn,w){
  return 'https://commons.wikimedia.org/w/index.php?title=Special:FilePath/'+encodeURIComponent(fn)+'&width='+(w||600)+'&_t='+Date.now();
}

function loadImg(wrap,fn,contain,w){
  if(contain) wrap.classList.add('contain');
  wrap.innerHTML='<div class="loading-box"><div class="spinner"></div><span>Loading...</span></div>';
  var img=document.createElement('img');
  var tried=false;
  img.onload=function(){wrap.innerHTML='';img.classList.add('loaded');wrap.appendChild(img);};
  img.onerror=function(){
    if(!tried){tried=true;img.src=wmUrl(fn,w||600);return;}
    var ef=encodeURIComponent(fn);
    wrap.innerHTML='<div class="err-box"><p>Image could not load.<br>Check your connection.</p>'
      +'<button class="retry-btn" onclick="doRetry(this,\''+ef+'\','+(contain?1:0)+','+(w||600)+')">Tap to retry</button></div>';
  };
  img.src=wmUrl(fn,w||600);
}

function doRetry(btn,ef,contain,w){loadImg(btn.parentElement.parentElement,decodeURIComponent(ef),!!contain,w);}

   facts:['A romantic partner dance from Argentina','It began in the city of Buenos Aires long ago','Two people dance closely together as a pair','The dancers move smoothly with sharp turns and pauses','It is danced to special tango music often with an accordion-like instrument','The bandoneon is the instrument that gives tango its sound','Dancers seem to glide across the floor','There is a world tango championship held every year','It can look both elegant and dramatic','Tango is now danced in many countries around the world']},
  {title:'Ballet',sub:'Europe — classical dance',img:'Ballet Dancer Performing in Studio (17240209739).jpg',

  {title:'Breakdance',sub:'USA — street and hip-hop dance',img:'Breakdance cypher.JPG',containImg:true,
   facts:['An energetic street dance also called breaking','It started in New York City as part of hip-hop culture','Dancers are often called b-boys and b-girls','Moves include spins freezes and fancy footwork','Some dancers even spin on their heads or hands','It is usually danced to hip-hop and funk music','Dancers often perform in a circle called a cypher','People take turns showing off their best moves','It became an official Olympic sport in 2024','It is all about creativity energy and style']},
  {title:'Irish Dance',sub:'Ireland — traditional step dance',img:'18th International Folklore Festival 2012, Plovdiv (Bulgaria) - Irish dance group 01.jpg',
   facts:['A traditional dance from Ireland','Dancers keep their arms straight down at their sides','All the movement happens in the fast footwork','Dancers often perform in lines or groups together','It is danced to lively Irish folk music with fiddles','The famous show Riverdance made it popular worldwide','Some shoes are soft and some have hard tips that tap','The hard shoes make a loud rhythmic tapping sound','Dancers wear costumes with colourful Celtic patterns','Children all over Ireland learn it at a young age']},
  {title:'Haka',sub:'New Zealand — Māori ceremonial dance',img:'World War 1 Maori soldiers performing a haka, Egypt - Photograph taken by J M (21015849313).jpg',
   facts:['A powerful group dance of the Māori people of New Zealand','It is performed with strong stamping and loud chanting','Dancers slap their chests and arms and stamp their feet','They often make fierce faces and stick out their tongues','Long ago it was performed before going into battle','Today it is used to welcome guests and honour people','It is famously performed by New Zealands rugby team','The whole group moves and shouts together as one','It shows strength pride and unity','Each haka can tell a story or send a message']},
  {title:'Hula',sub:'Hawaii — Polynesian dance',img:'Kealii Reichel Hula Halau 2005 01.jpg',

  {title:'Dragon Dance',sub:'China — festival dance',img:'Dragon Dance, Oklahoma City, OK, Lunar New Year, 2024 (Year of the Dragon).jpg',

  {title:'Budgerigar',sub:'Melopsittacus undulatus — Australia',img:'Budgerigar.JPG',

  {title:'Cockatiel',sub:'Nymphicus hollandicus — Australia',img:'Female Cockatiel.JPG',

  {title:'Kea',sub:'Nestor notabilis — New Zealand',img:'Kea sopot.JPG',

  {title:'Rainbow Lorikeet',sub:'Trichoglossus moluccanus — Australia',img:'Rainbow lorikeet.jpg',

function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}

function render(){
  var card=CATS[catIdx].cards[order[cardIdx]];
  flipped=false;
  document.getElementById('card').classList.remove('flipped');
  var front=document.getElementById('front');
  var back=document.getElementById('back');
  front.innerHTML='';back.innerHTML='';

  var iw=document.createElement('div');iw.className='img-wrap';front.appendChild(iw);
  loadImg(iw,card.img,!!card.containImg);

  var ft=document.createElement('div');ft.className='card-footer';
  ft.innerHTML='<div class="card-title">'+card.title+'</div>'
    +'<div class="card-sub">'+(card.sub||'')+'</div>'
    +'<div class="tap-hint">Tap to see 10 facts</div>';
  front.appendChild(ft);

  var sc=document.createElement('div');sc.className='back-scroll';
  var bh='<h2>'+card.title+'</h2>';
  if(card.iconic){bh+='<div class="iconic-wrap" id="iw"></div><div class="iconic-caption">'+(card.iconicCaption||'')+'</div>';}
  card.facts.forEach(function(f,i){bh+='<div class="fact-row"><span class="fact-n">'+(i+1)+'</span><span>'+f+'</span></div>';});
  sc.innerHTML=bh;back.appendChild(sc);

  if(card.iconic){var iconWrap=document.getElementById('iw');if(iconWrap)loadImg(iconWrap,card.iconic,false,card.iconicW||400);}
  document.getElementById('prog').textContent='Card '+(cardIdx+1)+' of '+order.length;
}

function flipCard(){flipped=!flipped;document.getElementById('card').classList.toggle('flipped',flipped);}
function next(){cardIdx=(cardIdx+1)%order.length;render();}
function prev(){cardIdx=(cardIdx-1+order.length)%order.length;render();}

function switchCat(i){
  catIdx=i;cardIdx=0;flipped=false;
  order=shuffle(CATS[i].cards.map(function(_,j){return j;}));
  document.querySelectorAll('.cat-btn').forEach(function(b,idx){b.classList.toggle('active',idx===i);});
  document.getElementById('cat-label').textContent=CATS[i].title;
  render();
}

function speak(){
  var card=CATS[catIdx].cards[order[cardIdx]];
  if('speechSynthesis' in window){window.speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(card.title);u.rate=0.88;u.pitch=1.05;window.speechSynthesis.speak(u);}
}

function goFS(){
  var el=document.getElementById('app');
  if(el.requestFullscreen)el.requestFullscreen();
  else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();
  else if(el.mozRequestFullScreen)el.mozRequestFullScreen();
}

document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight')next();
  else if(e.key==='ArrowLeft')prev();
  else if(e.key===' '){e.preventDefault();flipCard();}
  else if(e.key==='s'||e.key==='S')speak();
});

switchCat(0);
</script>
